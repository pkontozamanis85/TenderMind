# ==========================================
# Application Context
# ==========================================
spring.application.name=bid-recommendation-api

# ==========================================
# Database Configuration (H2 In-Memory - GitHub Ready)
# ==========================================
# The database lives in memory and is recreated on every startup.
spring.datasource.url=jdbc:h2:mem:bid_incoming;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.defer-datasource-initialization=true

# Enable H2 Web Console (Access via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# Connection Pool (HikariCP)
# ==========================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ==========================================
# Hibernate & JPA
# ==========================================
# Automatically creates the database schema from your Java Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# SQL Logging (Disabled for cleaner console, set to true if debugging)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Server Settings
# ==========================================
server.shutdown=graceful